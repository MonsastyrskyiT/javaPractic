<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8; }
    .calc { background: #fdf6e3; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; width: 280px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .display {
      background: #fff; border-bottom: 1px solid #ccc;
      padding: 18px; font-size: 28px; text-align: right;
      min-height: 70px; word-break: break-all; color: #222;
    }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); }
    button {
      border: 1px solid #ccc; background: #f5f5f5;
      padding: 20px 0; font-size: 22px; cursor: pointer;
      transition: background 0.1s;
    }
    button:hover  { background: #e0e0e0; }
    button:active { background: #ccc; }
    button.op  { background: #e8eaf6; }
    button.op:hover { background: #c5cae9; }
    button.eq  { background: #bde5be; grid-column: span 2; }
    button.eq:hover { background: #64bd67; }
    button.zero { grid-column: span 1; }
  </style>

</head>
<body>
    <div class="calc">
  <div class="display" id="display">0</div>
  <div class="grid">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="pressOp('+')">+</button>
 
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="pressOp('-')">−</button>
 
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="op" onclick="pressOp('*')">×</button>
 
    <button onclick="press('0')">0</button>
    <button class="eq" onclick="calculate()">=</button>
    <button class="op" onclick="pressOp('/')">÷</button>
  </div>
</div>
<script>
  var first = null, op = null, second = null, newNum = true;
  var expr = "";
 
  function updateDisplay(val) {
    document.getElementById("display").textContent = val;
  }
 
  function press(digit) {
    if (newNum) { second = digit; newNum = false; }
    else         { second = (second === "0" ? digit : second + digit); }
    if (first !== null && op !== null) {
      updateDisplay(first + " " + op + " " + second);
    } else {
      first = second;
      updateDisplay(first);
    }
  }
 
  function pressOp(o) {
    if (first === null) first = second || "0";
    op = o; second = null; newNum = true;
    updateDisplay(first + " " + o + " ");
  }
 
  function calculate() {
    if (first === null || op === null || second === null) return;
    var a = parseFloat(first), b = parseFloat(second), res;
    if (op === '+') res = a + b;
    else if (op === '-') res = a - b;
    else if (op === '*') res = a * b;
    else if (op === '/') res = b !== 0 ? a / b : "Помилка";
    var displayOp = op === '*' ? '×' : op === '/' ? '÷' : op;
    updateDisplay(first + " " + displayOp + " " + second + " = " + (typeof res === 'number' ? parseFloat(res.toFixed(8)) : res));
    first = String(res); op = null; second = null; newNum = true;
  }
</script>
</body>
</html>
