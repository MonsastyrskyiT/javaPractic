<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8; margin: 0; }
    .like-btn {
      display: flex; align-items: center; gap: 14px;
      background: #1877f2; color: #fff;
      border: none; border-radius: 12px;
      padding: 22px 48px; font-size: 42px; font-weight: bold;
      cursor: pointer; box-shadow: 0 4px 16px rgba(24,119,242,0.4);
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    .like-btn:hover  { background: #1460c8; }
    .like-btn:active { transform: scale(0.96); }
    .thumb { font-size: 40px; }
  </style>

</head>
<body>  <button class="like-btn" id="likeBtn">
    <span class="thumb">gooooooooooooooog</span>
    <span>Like </span>
    <span id="counter">0</span>
  </button>
  <script>
    var count = 0;
    document.getElementById("likeBtn").addEventListener("click", function() {
      count++;
      document.getElementById("counter").textContent = count;
    });
  </script>
</body>
</html>
